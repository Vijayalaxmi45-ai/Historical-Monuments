<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background-image: url('img/history.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    .main-div {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.4);
      padding: 40px 30px;
      border-radius: 15px;
      max-width: 600px;
      width: 90%;
      color: #fff;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
    }

    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 30px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .form-control {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 8px;
      padding: 12px 15px;
      margin-bottom: 18px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .form-control:focus {
      border: 2px solid #FFD700;
      outline: none;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .form-icon {
      position: relative;
    }

    .form-icon i {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #333;
    }

    .form-icon input,
    .form-icon textarea {
      padding-left: 38px;
    }

    .btn-send {
      border: none;
      padding: 12px 20px;
      width: 100%;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      background-color: #28a745;
      color: white;
      transition: background-color 0.3s ease;
      cursor: pointer;
    }

    .btn-send:hover {
      background-color: #218838;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-div">
    <h1><i class="bi bi-chat-left-dots-fill"></i> Contact Us</h1>
    <form action="#" method="POST">
      <div class="form-icon">
        <i class="bi bi-person-fill"></i>
        <input type="text" placeholder="Your Name" class="form-control" name="name" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-envelope-fill"></i>
        <input type="email" placeholder="Your Email" class="form-control" name="email" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-chat-text-fill"></i>
        <textarea placeholder="Your Message" class="form-control" name="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn-send mt-3"><i class="bi bi-send-fill"></i> Send Message</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
