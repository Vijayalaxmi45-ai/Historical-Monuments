<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <title>Registration</title>
    <style>
        body {
            background-image: url('img/history.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }
        .main-div {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .main-div::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('img/history.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(3px);
            z-index: -1;
        }
        .contact-container {
            background-color: black;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #fff;
            font-size: 1rem;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
            width: 48%;
        }

        .btn-submit:hover {
            background-color: #218838;
        }

        .btn-reset {
            background-color: #dc3545;
            color: white;
            padding: 12px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 48%;
        }

        .btn-reset:hover {
            background-color: #c82333;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

    </style>
</head>
<body>

    <div class="main-div">
        <div class="contact-container">
            <h1>Create Account</h1>
            <form action="registration_conn.php" method="post" id="registration-form">
                <input type="text" placeholder="Enter Name" class="form-control" name="Usename" required><br>
                <input type="number" placeholder="Enter Mobile No" class="form-control" name="UserMob" required><br>
                <input type="email" placeholder="Enter Email" class="form-control" name="UserEmail" required><br>
                <input type="text" placeholder="Enter Address" class="form-control" name="UserAddres" required><br>
                <input type="password" placeholder="Enter password" class="form-control" id="password" name="UserPassword" required><br>
                <input type="password" placeholder="Confirm password" class="form-control" id="confirm-password" name="UserPassword" required><br>
                <div class="btn-container">
                    <button type="submit" class="btn-submit btn btn-success">Submit</button>
                    <button type="reset" class="btn-reset btn btn-danger">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        // Form validation for confirm password matching
        const form = document.getElementById('registration-form');
        form.addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                event.preventDefault(); // Prevent form submission if passwords don't match
            }
        });
    </script>

</body>
</html>
