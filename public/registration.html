<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <title>Registration</title>
  <style>
    body {
      background-image: url('img/history.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
 /*for background img transperent*/
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    .main-div {
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.4);
      padding: 40px 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      color: #fff;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
    }

    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 30px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .form-control {
      background-color: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 8px;
      padding: 12px 15px;
      margin-bottom: 18px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .form-control:focus {
      border: 2px solid #FFD700;
      outline: none;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .form-icon {
      position: relative;
    }

    .form-icon i {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #333;
    }

    .form-icon input {
      padding-left: 38px;
    }

    .btn-container {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .btn-submit,
    .btn-reset {
      border: none;
      padding: 12px 20px;
      width: 100%;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn-submit {
      background-color: #28a745;
      color: white;
    }

    .btn-submit:hover {
      background-color: #218838;
    }

    .btn-reset {
      background-color: #dc3545;
      color: white;
    }

    .btn-reset:hover {
      background-color: #c82333;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-div">
    <h1><i class="bi bi-person-plus-fill"></i> Create Account</h1>
    <form action="registration_conn.php" method="post" id="registration-form">
      <div class="form-icon">
        <i class="bi bi-person"></i>
        <input type="text" placeholder="Enter Name" class="form-control" name="Username" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-phone"></i>
        <input type="number" placeholder="Enter Mobile No" class="form-control" name="UserMob" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-envelope"></i>
        <input type="email" placeholder="Enter Email" class="form-control" name="UserEmail" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-geo-alt"></i>
        <input type="text" placeholder="Enter Address" class="form-control" name="UserAddress" required>
  </div>
      <div class="form-icon">
        <i class="bi bi-lock"></i>
        <input type="password" placeholder="Enter Password" class="form-control" id="password" name="UserPassword" required>
      </div>
      <div class="form-icon">
        <i class="bi bi-lock-fill"></i>
        <input type="password" placeholder="Confirm Password" class="form-control" id="confirm-password" required>
      </div>
      <div class="btn-container mt-3">
        <button type="submit" class="btn-submit">Submit</button>
        <button type="reset" class="btn-reset">Cancel</button>
      </div>
    </form>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('registration-form');
    form.addEventListener('submit', function(event) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
