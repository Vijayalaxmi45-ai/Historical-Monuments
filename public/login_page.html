<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <title>Login</title>
  <style>
    body {
      background-image: url('img/history.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    /*for background img transperent*/
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }
    .main-div {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.4);
      padding: 40px 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      color: #fff;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
    }
    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 30px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }
    .form-control {
      background-color: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 8px;
      padding: 12px 15px;
      margin-bottom: 18px;
      font-size: 1rem;
      transition: 0.3s;
    }
    .form-control:focus{
      border: 2px solid #FFD700;
      outline: none;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    .form-icon {
      position: relative;
    }
    .form-icon span{
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #333;
    }

    .form-icon input {
      padding-left: 38px;
    }

    .btn-container {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .btn-login,
    .btn-reset {
      border: none;
      padding: 12px 20px;
      width: 100%;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn-login {
      background-color: #28a745;
      color: white;
    }

    .btn-login:hover {
      background-color: #218838;
    }

    .btn-reset {
      background-color: #dc3545;
      color: white;
    }

    .btn-reset:hover {
      background-color: #c82333;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-div">
    <h1><span class="bi bi-box-arrow-in-right"></span> Login</h1>
    <form action="login_conn.php" method="post">
      <div class="form-icon">
        <span class="bi bi-envelope"></span>
        <input type="email" placeholder="Enter Email" class="form-control" name="UserEmail" required>
      </div>
      <div class="form-icon">
        <span class="bi bi-lock-fill"></span>
        <input type="password" placeholder="Enter Password" class="form-control" name="UserPass" required>
      </div>
      <div class="btn-container mt-3">
        <button type="submit" class="btn-login">Login</button>
        <button type="reset" class="btn-reset">Cancel</button>
      </div>
    </form>
  </div>
</body>
</html>
